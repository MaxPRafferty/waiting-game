<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Waiting Game</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☐</text></svg>">
  <style>
    :root {
      --bg:         #16161d;
      --text:       #e0d8c8;
      --muted:      #a89a80;
      --border:     #3a342a;
      --ghost:      #2a241a;
      --primary:    #ffcc00;
      --secondary:  #cc99ff;
      --winner-bg:  var(--primary);
      --winner-fg:  var(--bg);
      --scale:      1.4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .header {
      padding: calc(20px * var(--scale)) calc(32px * var(--scale)) calc(14px * var(--scale));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: calc(16px * var(--scale));
      flex-shrink: 0;
    }

    .position-number {
      font-family: 'Courier New', Courier, monospace;
      font-size: calc(44px * var(--scale));
      font-weight: bold;
      letter-spacing: -1px;
      line-height: 1;
    }

    .position-label {
      font-size: calc(15px * var(--scale));
      color: var(--muted);
    }

    .departure-counter {
      margin-left: auto;
      font-size: calc(12px * var(--scale));
      color: var(--muted);
      font-style: italic;
      text-align: right;
      line-height: 1.5;
    }

    .announcement {
      background: var(--winner-bg);
      color: var(--winner-fg);
      padding: calc(9px * var(--scale)) calc(32px * var(--scale));
      font-size: calc(13px * var(--scale));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }
    .announcement.visible { display: block; }

    .status {
      padding: calc(7px * var(--scale)) calc(32px * var(--scale));
      font-size: calc(13px * var(--scale));
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-style: italic;
      flex-shrink: 0;
      min-height: calc(30px * var(--scale));
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 calc(32px * var(--scale));
      overflow: hidden;
    }

    .strip-container {
      position: relative;
    }

    .strip-labels {
      height: calc(18px * var(--scale));
      position: relative;
      margin-bottom: calc(4px * var(--scale));
      font-size: calc(10px * var(--scale));
      color: var(--muted);
      font-family: 'Courier New', Courier, monospace;
    }
    .strip-label {
      position: absolute;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .strip {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: calc(10px * var(--scale)) 0;
      min-height: calc(44px * var(--scale));
      gap: 0;
      position: relative;
    }

    .slot {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      flex-shrink: 0;
      transition: opacity 30s linear;
    }

    .slot input[type="checkbox"] {
      width: calc(14px * var(--scale));
      height: calc(14px * var(--scale));
      cursor: default;
      accent-color: var(--text);
      pointer-events: none;
      filter: invert(1);
    }

    .slot.mine {
      outline: 1px dashed var(--muted);
      outline-offset: -3px;
    }

    .slot.eligible input {
      cursor: pointer;
      pointer-events: all;
    }

    .slot.ghost {
      opacity: 0.12;
    }

    .strip-pointer {
      position: relative;
      height: calc(20px * var(--scale));
      margin-top: calc(4px * var(--scale));
    }
    .pointer-label {
      position: absolute;
      font-size: calc(11px * var(--scale));
      color: var(--muted);
      transform: translateX(-50%);
      white-space: nowrap;
      font-style: italic;
    }

    .footer {
      padding: calc(10px * var(--scale)) calc(32px * var(--scale));
      border-top: 1px solid var(--border);
      font-size: calc(11px * var(--scale));
      color: var(--border);
      flex-shrink: 0;
    }

    .connecting {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-style: italic;
      font-size: calc(14px * var(--scale));
    }

    .nav-bar {
      margin-top: calc(32px * var(--scale));
      display: flex;
      justify-content: center;
      gap: calc(12px * var(--scale));
    }

    .nav-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: calc(6px * var(--scale)) calc(12px * var(--scale));
      font-size: calc(11px * var(--scale));
      font-family: Georgia, serif;
      font-style: italic;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav-btn:active {
      background: var(--primary);
      color: var(--bg);
    }

    /* ── Neighborhood Chat ── */
    .chat-panel {
      position: fixed;
      bottom: calc(20px * var(--scale));
      right: calc(32px * var(--scale));
      width: calc(280px * var(--scale));
      height: calc(320px * var(--scale));
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      font-size: calc(11px * var(--scale));
      z-index: 1000;
      opacity: 0.9;
    }

    .chat-header {
      padding: calc(8px * var(--scale));
      border-bottom: 1px solid var(--border);
      background: var(--border);
      color: var(--muted);
      font-style: italic;
      display: flex;
      justify-content: space-between;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: calc(8px * var(--scale));
      display: flex;
      flex-direction: column;
      gap: calc(4px * var(--scale));
      scrollbar-width: thin;
      scrollbar-color: var(--border) var(--bg);
    }

    .chat-msg {
      word-wrap: break-word;
      line-height: 1.4;
    }

    .chat-msg .peer { color: var(--secondary); font-weight: bold; }
    .chat-msg .self { color: var(--primary); font-weight: bold; }

    .chat-input-area {
      padding: calc(8px * var(--scale));
      border-top: 1px solid var(--border);
    }

    #chat-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      outline: none;
      padding: calc(4px * var(--scale));
    }

    #chat-input:focus {
      border-bottom-color: var(--primary);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="position-number" id="pos-number">—</div>
  <div class="position-label" id="pos-label">
    <div id="current-status">connecting...</div>
    <div id="started-status" style="font-size: 0.8em; margin-top: 4px; opacity: 0.8; display: none;"></div>
  </div>
  <div class="departure-counter" id="departure-counter"></div>
</div>

<div class="announcement" id="announcement"></div>

<div class="status" id="status">The contest is running. It has always been running.</div>

<div class="main" id="main">
  <div class="connecting" id="connecting-msg">Joining the line...</div>

  <div class="strip-container" id="strip-container" style="display:none">
    <div class="strip-labels" id="strip-labels"></div>
    <div class="strip" id="strip"></div>
    <div class="strip-pointer" id="strip-pointer"></div>
    
    <div class="nav-bar">
      <button id="btn-front" class="nav-btn">Watch the Front</button>
      <button id="btn-me" class="nav-btn">Return to My Box</button>
      <button id="btn-back" class="nav-btn">Watch the Back</button>
    </div>
  </div>
</div>

<div class="chat-panel" id="chat-panel" style="display: none;">
  <div class="chat-header">
    <span>Neighborhood Chat</span>
    <span id="chat-peer-count">0 nearby</span>
  </div>
  <div class="chat-messages" id="chat-log"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Say something indifferent..." autocomplete="off" />
  </div>
</div>

<div class="footer">
  The Waiting Game &nbsp;·&nbsp; The contest does not have an opinion about your choices.
</div>

<script>
(async function () {
  const token = (function() {
    let t = sessionStorage.getItem('wg_token');
    if (!t) {
      t = crypto.randomUUID();
      sessionStorage.setItem('wg_token', t);
    }
    return t;
  })();

  // ── State ──
  let mySeq = null;
  let myPosition = null; // Absolute
  let myWaitingPosition = null; // Current place in waiting line
  let myStartingPosition = null; // Original waiting position
  let myChecked = false;
  let departuresTotal = 0;
  let totalSlots = 0;

  let scrollOffset = 0;
  let viewportWidth = 0;
  const SLOT_WIDTH = 34;
  const DOM_POOL_SIZE = 120;

  const slots = new Map();
  const domPool = [];
  const labelPool = [];

  // ── DOM Refs ──
  const $posNumber      = document.getElementById('pos-number');
  const $departureCounter = document.getElementById('departure-counter');
  const $announcement   = document.getElementById('announcement');
  const $status         = document.getElementById('status');
  const $connectingMsg  = document.getElementById('connecting-msg');
  const $stripContainer = document.getElementById('strip-container');
  const $strip          = document.getElementById('strip');
  const $stripLabels    = document.getElementById('strip-labels');
  const $stripPointer   = document.getElementById('strip-pointer');
  const $btnFront       = document.getElementById('btn-front');
  const $btnMe          = document.getElementById('btn-me');
  const $btnBack        = document.getElementById('btn-back');
  
  const $chatPanel      = document.getElementById('chat-panel');
  const $chatLog        = document.getElementById('chat-log');
  const $chatInput      = document.getElementById('chat-input');
  const $chatPeerCount  = document.getElementById('chat-peer-count');

  // ── P2P Chat (Trystero) ──
  let p2pRoom = null;
  let p2pSendAction = null;
  let currentNeighborhood = -1;

  async function initP2P() {
    try {
      const {joinRoom} = await import('https://cdn.skypack.dev/trystero/torrent');
      const config = {appId: 'the-waiting-game-neighborhood'};
      
      window.updateNeighborhood = (bucketId) => {
        if (bucketId === currentNeighborhood) return;
        currentNeighborhood = bucketId;
        
        if (p2pRoom) p2pRoom.leave();
        
        p2pRoom = joinRoom(config, `neighborhood-${bucketId}`);
        const [send, receive] = p2pRoom.makeAction('chat');
        p2pSendAction = send;
        
        $chatLog.innerHTML = `<div class="chat-msg"><em>Entered neighborhood ${bucketId + 1}</em></div>`;
        $chatPeerCount.textContent = '0 nearby';

        p2pRoom.onPeerJoin(id => {
          updatePeerCount();
          console.warn(`[P2P] Peer joined: ${id}`);
        });
        p2pRoom.onPeerLeave(id => {
          updatePeerCount();
          console.warn(`[P2P] Peer left: ${id}`);
        });

        receive((data, peerId) => {
          addChatMessage(peerId.substring(0, 5), data, false);
        });

        updatePeerCount();
      };

      function updatePeerCount() {
        const count = Object.keys(p2pRoom.getPeers()).length;
        $chatPeerCount.textContent = `${count} nearby`;
      }

      $chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && $chatInput.value.trim()) {
          const text = $chatInput.value.trim();
          if (p2pSendAction) p2pSendAction(text);
          addChatMessage('you', text, true);
          $chatInput.value = '';
        }
      });

      $chatPanel.style.display = 'flex';
    } catch (err) {
      console.warn('[P2P] Failed to initialize Trystero:', err);
    }
  }

  function addChatMessage(author, text, isSelf) {
    const el = document.createElement('div');
    el.className = 'chat-msg';
    const nameClass = isSelf ? 'self' : 'peer';
    el.innerHTML = `<span class="${nameClass}">${author}:</span> ${text}`;
    $chatLog.appendChild(el);
    $chatLog.scrollTop = $chatLog.scrollHeight;
  }

  // ── Initialization ──
  function initDomPool() {
    for (let i = 0; i < DOM_POOL_SIZE; i++) {
      const el = document.createElement('div');
      el.className = 'slot';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      el.appendChild(cb);
      el.style.display = 'none';
      $strip.appendChild(el);
      domPool.push({ el, cb });
    }
    for (let i = 0; i < DOM_POOL_SIZE / 5; i++) {
      const lbl = document.createElement('div');
      lbl.className = 'strip-label';
      lbl.style.display = 'none';
      $stripLabels.appendChild(lbl);
      labelPool.push(lbl);
    }
  }
  initDomPool();

  const wsUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host;
  let ws = null;

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.addEventListener('open', () => send({ type: 'join', token }));
    ws.addEventListener('message', handleWsMessage);
    ws.addEventListener('close', () => {
      if (pingInterval) clearInterval(pingInterval);
      showStatus('The connection has been lost. Reload to rejoin.', 'negative');
    });
    ws.addEventListener('error', (_err) => {
      console.warn('WebSocket encountered a difficulty.');
      showStatus('The connection encountered a difficulty.', 'negative');
    });
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  let pingInterval = null;
  function startPingLoop() {
    if (pingInterval) clearInterval(pingInterval);
    pingInterval = setInterval(() => send({ type: 'ping' }), 5000);
  }

  async function restAction(path, method = 'POST', body = null) {
    try {
      const options = {
        method,
        headers: { 'Content-Type': 'application/json' }
      };
      if (body) options.body = JSON.stringify(body);
      const res = await fetch(path, options);
      if (!res.ok) throw new Error(`HTTP error ${res.status}`);
      return await res.json();
    } catch (err) {
      console.warn(`REST action ${path} failed:`, err);
      return null;
    }
  }

  function render() {
    if (totalSlots === 0 || mySeq === null) return;
    if (viewportWidth === 0) viewportWidth = $strip.clientWidth || window.innerWidth - 64;

    const visibleCount = Math.ceil(viewportWidth / SLOT_WIDTH) + 2;
    const startPos = Math.floor(scrollOffset);
    const endPos = startPos + visibleCount;

    domPool.forEach(item => item.el.style.display = 'none');
    labelPool.forEach(lbl => lbl.style.display = 'none');
    $stripPointer.innerHTML = '';

    const visiblePositions = [];
    for (let i = startPos; i <= endPos; i++) {
      if (i >= 0 && i < totalSlots) visiblePositions.push(i);
    }

    const isEligible = !myChecked && Array.from(slots.values())
      .filter(s => s.seq < mySeq && s.state === 'waiting' && s.seq >= 0)
      .length === 0;

    let poolIdx = 0;
    let labelIdx = 0;

    visiblePositions.forEach((pos) => {
      const slot = Array.from(slots.values()).find(s => s.position === pos);
      if (!slot || poolIdx >= DOM_POOL_SIZE) return;

      const item = domPool[poolIdx++];
      item.el.style.display = 'flex';
      item.el.dataset.seq = slot.seq;
      const left = (pos - scrollOffset) * SLOT_WIDTH;
      item.el.style.left = left + 'px';

      item.cb.disabled = true;
      item.cb.checked = slot.state === 'checked';
      item.cb.onchange = null;

      item.el.className = 'slot';
      const isMine = slot.seq === mySeq;

      if (isMine) {
        item.el.classList.add('mine');
        if (isEligible && !myChecked) {
          item.el.classList.add('eligible');
          item.cb.disabled = false;
          item.cb.onchange = async () => {
            if (item.cb.checked) {
              const res = await restAction('/check', 'POST', { token });
              if (!res) item.cb.checked = false;
            }
          };
        }
      }

      if (slot.state === 'ghost') item.el.classList.add('ghost');

      if (pos % 5 === 0 && labelIdx < labelPool.length) {
        const lbl = labelPool[labelIdx++];
        lbl.style.display = 'block';
        lbl.style.left = (left + SLOT_WIDTH / 2) + 'px';
        lbl.textContent = '#' + (pos + 1);
      }

      if (isMine) {
        const ptr = document.createElement('div');
        ptr.className = 'pointer-label';
        ptr.style.left = (left + SLOT_WIDTH / 2) + 'px';
        ptr.textContent = myChecked ? '✓ you' : '▲ you';
        $stripPointer.appendChild(ptr);
      }
    });
  }

  let lastSubscribedRange = { from: -1, to: -1 };

  function updateScroll(delta, isAbsolute = false) {
    const prevOffset = scrollOffset;
    if (isAbsolute) {
      scrollOffset = Math.max(0, Math.min(totalSlots - 1, delta));
    } else {
      scrollOffset = Math.max(0, Math.min(totalSlots - 1, scrollOffset + delta / SLOT_WIDTH));
    }

    if (scrollOffset !== prevOffset || isAbsolute) {
      render();
      syncViewport();
      
      // Update P2P neighborhood (100 slots per room)
      if (window.updateNeighborhood) {
        window.updateNeighborhood(Math.floor(scrollOffset / 100));
      }
    }
  }

  function syncViewport(force = false) {
    const visibleCount = Math.ceil(viewportWidth / SLOT_WIDTH) + 10;
    const from = Math.max(0, Math.floor(scrollOffset) - 5);
    const to = from + visibleCount;

    if (force || Math.abs(from - lastSubscribedRange.from) > 5 || Math.abs(to - lastSubscribedRange.to) > 5) {
      send({ type: 'viewport_subscribe', from_position: from, to_position: to });
      lastSubscribedRange = { from, to };
    }
  }

  window.addEventListener('wheel', (e) => updateScroll(e.deltaY || e.deltaX), { passive: true });
  window.addEventListener('resize', () => {
    viewportWidth = $strip.clientWidth;
    render();
  });

  $btnFront.addEventListener('click', () => updateScroll(0, true));
  $btnMe.addEventListener('click', () => {
    if (myPosition === null) return;
    const targetOffset = Math.max(0, myPosition - Math.floor((viewportWidth / SLOT_WIDTH) / 2));
    updateScroll(targetOffset, true);
  });
  $btnBack.addEventListener('click', () => {
    const targetOffset = Math.max(0, totalSlots - Math.floor((viewportWidth / SLOT_WIDTH) / 2));
    updateScroll(targetOffset, true);
  });

  const POSITIVE_COLORS = ['#00ffcc', '#99ff99', '#ff99cc'];
  const NEGATIVE_COLORS = ['#ff5050', '#ff9900', '#ff00ff'];
  function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function getOrdinal(n) {
    const s = ["th", "st", "nd", "rd"];
    const v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function updatePosition(absPos, waitPos) {
    myPosition = absPos;
    myWaitingPosition = waitPos;

    if (myStartingPosition === null && waitPos !== null) {
      myStartingPosition = waitPos;
      const $started = document.getElementById('started-status');
      $started.textContent = `Started ${getOrdinal(waitPos + 1)} in line`;
      $started.style.display = 'block';
    }

    const $current = document.getElementById('current-status');

    if (myChecked) {
      $posNumber.textContent = '✓';
      $posNumber.style.color = 'var(--primary)';
      $current.textContent = `You won!`;
      showStatus('The contest notes your victory.', 'positive');
      document.title = '✓ The Waiting Game';
    } else if (waitPos === 0) {
      $posNumber.textContent = '1st';
      $posNumber.style.color = 'var(--secondary)';
      $current.textContent = 'First in line';
      document.title = '1st — The Waiting Game';
    } else {
      $posNumber.textContent = getOrdinal(waitPos + 1);
      $posNumber.style.color = '';
      $current.textContent = 'in line';
      document.title = getOrdinal(waitPos + 1) + ' — The Waiting Game';
    }
  }

  function updateDepartures() {
    if (departuresTotal === 0) {
      $departureCounter.textContent = '';
      return;
    }
    $departureCounter.innerHTML = departuresTotal.toLocaleString() + ' have been<br>returned to the world today.';
  }

  function showAnnouncement(text, tone = 'positive') {
    const color = getRandom(tone === 'positive' ? POSITIVE_COLORS : NEGATIVE_COLORS);
    $announcement.textContent = text;
    $announcement.style.backgroundColor = color;
    $announcement.style.color = '#16161d';
    $announcement.classList.add('visible');
    setTimeout(() => $announcement.classList.remove('visible'), 12000);
  }

  function showStatus(text, tone = 'neutral') {
    $status.textContent = text;
    if (tone === 'positive') $status.style.color = getRandom(POSITIVE_COLORS);
    else if (tone === 'negative') $status.style.color = getRandom(NEGATIVE_COLORS);
    else $status.style.color = '';
  }

  function formatDuration(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ' + (s % 60) + 's';
    const h = Math.floor(m / 60);
    return h + 'h ' + (m % 60) + 'm';
  }

  function handleWsMessage(ev) {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (_err) { return; }

    switch (msg.type) {
      case 'joined':
        mySeq = msg.seq;
        $connectingMsg.style.display = 'none';
        $stripContainer.style.display = 'block';
        viewportWidth = $strip.clientWidth || window.innerWidth - 64;
        scrollOffset = Math.max(0, msg.position - Math.floor((viewportWidth / SLOT_WIDTH) / 2));
        updatePosition(msg.position, msg.waiting_position);
        startPingLoop();
        showStatus(
          msg.waiting_position === 0
            ? 'You are first in line. It is your turn when you are ready.'
            : 'You are in line. The contest is aware of your presence.',
          msg.waiting_position === 0 ? 'positive' : 'neutral'
        );
        syncViewport(true);
        initP2P();
        break;

      case 'range_state':
        totalSlots = msg.total;
        const mine = mySeq !== null ? slots.get(mySeq) : null;
        slots.clear();
        if (mine) slots.set(mySeq, mine);
        for (const s of msg.slots) {
          slots.set(s.seq, { seq: s.seq, position: s.position, state: s.state });
        }
        render();
        break;

      case 'range_update':
        slots.set(msg.seq, { seq: msg.seq, position: msg.position, state: msg.state });
        if (msg.position >= totalSlots) totalSlots = msg.position + 1;
        if (msg.seq === mySeq && msg.state === 'checked') myChecked = true;
        render();
        break;

      case 'position_update':
        updatePosition(msg.position, msg.waiting_position);
        if (mySeq !== null && slots.has(mySeq)) {
          slots.get(mySeq).position = msg.position;
        }
        render();
        break;

      case 'left':
        const s = slots.get(msg.seq);
        if (s) {
          s.state = 'ghost';
          render();
          setTimeout(() => { slots.delete(msg.seq); render(); }, 30000);
        }
        departuresTotal = msg.departures_today;
        updateDepartures();
        break;

      case 'check_ok':
        myChecked = true;
        if (slots.has(mySeq)) slots.get(mySeq).state = 'checked';
        updatePosition(msg.position, 0);
        showStatus('You have checked your box. The contest notes your participation.', 'positive');
        render();
        break;

      case 'winner':
        showAnnouncement(`A contestant at position #${msg.position + 1} has checked their box after ${formatDuration(msg.duration_ms)}.`);
        if (msg.seq !== mySeq) showStatus('Someone ahead of you has finished. The line adjusts.', 'neutral');
        break;
    }
  }

  connect();
})();
</script>
</body>
</html>
