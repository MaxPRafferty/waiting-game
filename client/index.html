<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Waiting Game</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☐</text></svg>">
  <style>
    :root {
      --bg:         #16161d; /* Eigengrau */
      --text:       #e0d8c8; /* Inverted from original dark */
      --muted:      #a89a80;
      --border:     #3a342a; /* Inverted from light border */
      --ghost:      #2a241a;
      --primary:    #ffcc00; /* Mustard of Authority */
      --secondary:  #cc99ff; /* Indifferent Lavender */
      --winner-bg:  var(--primary);
      --winner-fg:  var(--bg);
      --scale:      1.4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      padding: calc(20px * var(--scale)) calc(32px * var(--scale)) calc(14px * var(--scale));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: calc(16px * var(--scale));
      flex-shrink: 0;
    }

    .position-number {
      font-family: 'Courier New', Courier, monospace;
      font-size: calc(44px * var(--scale));
      font-weight: bold;
      letter-spacing: -1px;
      line-height: 1;
    }

    .position-label {
      font-size: calc(15px * var(--scale));
      color: var(--muted);
    }

    .departure-counter {
      margin-left: auto;
      font-size: calc(12px * var(--scale));
      color: var(--muted);
      font-style: italic;
      text-align: right;
      line-height: 1.5;
    }

    /* ── Winner announcement ── */
    .announcement {
      background: var(--winner-bg);
      color: var(--winner-fg);
      padding: calc(9px * var(--scale)) calc(32px * var(--scale));
      font-size: calc(13px * var(--scale));
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }
    .announcement.visible { display: block; }

    /* ── Status ── */
    .status {
      padding: calc(7px * var(--scale)) calc(32px * var(--scale));
      font-size: calc(13px * var(--scale));
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-style: italic;
      flex-shrink: 0;
      min-height: calc(30px * var(--scale));
    }

    /* ── Main viewport ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 calc(32px * var(--scale));
      overflow: hidden;
    }

    .strip-container {
      position: relative;
    }

    /* Position labels */
    .strip-labels {
      height: calc(18px * var(--scale));
      position: relative;
      margin-bottom: calc(4px * var(--scale));
      font-size: calc(10px * var(--scale));
      color: var(--muted);
      font-family: 'Courier New', Courier, monospace;
    }
    .strip-label {
      position: absolute;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* The checkbox strip */
    .strip {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: calc(10px * var(--scale)) 0;
      min-height: calc(44px * var(--scale));
      gap: 0;
      position: relative;
    }

    .slot {
      width: 34px; /* Increased from 24px * 1.4 = 33.6 */
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      transition: opacity 30s linear;
    }

    .slot input[type="checkbox"] {
      width: calc(14px * var(--scale));
      height: calc(14px * var(--scale));
      cursor: default;
      accent-color: var(--text);
      pointer-events: none;
      filter: invert(1); /* Ensure the checkbox itself is visible on dark bg */
    }

    /* User's own slot */
    .slot.mine {
      outline: 1px dashed var(--muted);
      outline-offset: -3px;
    }

    /* Eligible to check */
    .slot.eligible input {
      cursor: pointer;
      pointer-events: all;
    }

    /* Ghost: someone just left — fade via transition already on .slot */
    .slot.ghost {
      opacity: 0.12;
    }

    /* Pointer below strip */
    .strip-pointer {
      position: relative;
      height: calc(20px * var(--scale));
      margin-top: calc(4px * var(--scale));
    }
    .pointer-label {
      position: absolute;
      font-size: calc(11px * var(--scale));
      color: var(--muted);
      transform: translateX(-50%);
      white-space: nowrap;
      font-style: italic;
    }

    /* ── Footer ── */
    .footer {
      padding: calc(10px * var(--scale)) calc(32px * var(--scale));
      border-top: 1px solid var(--border);
      font-size: calc(11px * var(--scale));
      color: var(--border);
      flex-shrink: 0;
    }

    /* ── Connecting overlay ── */
    .connecting {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-style: italic;
      font-size: calc(14px * var(--scale));
    }

    /* ── Navigation ── */
    .nav-bar {
      margin-top: calc(32px * var(--scale));
      display: flex;
      justify-content: center;
      gap: calc(12px * var(--scale));
    }

    .nav-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: calc(6px * var(--scale)) calc(12px * var(--scale));
      font-size: calc(11px * var(--scale));
      font-family: Georgia, serif;
      font-style: italic;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav-btn:active {
      background: var(--primary);
      color: var(--bg);
    }
</head>
<body>

<div class="header">
  <div class="position-number" id="pos-number">—</div>
  <div class="position-label" id="pos-label">connecting...</div>
  <div class="departure-counter" id="departure-counter"></div>
</div>

<div class="announcement" id="announcement"></div>

<div class="status" id="status">The contest is running. It has always been running.</div>

<div class="main" id="main">
  <div class="connecting" id="connecting-msg">Joining the line...</div>

  <div class="strip-container" id="strip-container" style="display:none">
    <div class="strip-labels" id="strip-labels"></div>
    <div class="strip" id="strip"></div>
    <div class="strip-pointer" id="strip-pointer"></div>
    
    <div class="nav-bar">
      <button id="btn-front" class="nav-btn">Watch the Front</button>
      <button id="btn-me" class="nav-btn">Return to My Box</button>
      <button id="btn-back" class="nav-btn">Watch the Back</button>
    </div>
  </div>
</div>

<div class="footer">
  The Waiting Game &nbsp;·&nbsp; The contest does not have an opinion about your choices.
</div>

<script>
(function () {
  // ── Token ──
  let token = localStorage.getItem('wg_token');
  if (!token) {
    token = crypto.randomUUID();
    localStorage.setItem('wg_token', token);
  }

  // ── State ──
  let mySeq = null;
  let myPosition = null;
  let myChecked = false;
  let departuresTotal = 0;
  let totalSlots = 0;

  // Virtual scroll state
  let scrollOffset = 0; // The position (0-indexed) at the left of the viewport
  let viewportWidth = 0;
  const SLOT_WIDTH = 24;

  // Map<seq, { position, state: 'waiting'|'checked'|'ghost' }>
  const slots = new Map();

  // ── DOM refs ──
  const $posNumber      = document.getElementById('pos-number');
  const $posLabel       = document.getElementById('pos-label');
  const $departureCounter = document.getElementById('departure-counter');
  const $announcement   = document.getElementById('announcement');
  const $status         = document.getElementById('status');
  const $connectingMsg  = document.getElementById('connecting-msg');
  const $stripContainer = document.getElementById('strip-container');
  const $strip          = document.getElementById('strip');
  const $stripLabels    = document.getElementById('strip-labels');
  const $stripPointer   = document.getElementById('strip-pointer');
  const $btnFront       = document.getElementById('btn-front');
  const $btnMe          = document.getElementById('btn-me');
  const $btnBack        = document.getElementById('btn-back');

  // ── WebSocket ──
  const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
  const ws = new WebSocket(wsUrl);

  function send(msg) {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  // ── Ping loop ──
  let pingInterval = null;

  function startPingLoop() {
    pingInterval = setInterval(() => send({ type: 'ping' }), 5000);
  }

  // ── Rendering ──
  function render() {
    if (totalSlots === 0 || mySeq === null) return;

    const visibleCount = Math.ceil(viewportWidth / SLOT_WIDTH) + 2;
    const startPos = Math.floor(scrollOffset);
    const endPos = startPos + visibleCount;

    // Clear
    $strip.innerHTML = '';
    $stripLabels.innerHTML = '';
    $stripPointer.innerHTML = '';

    // Create a range to show
    const visiblePositions = [];
    for (let i = startPos; i <= endPos; i++) {
      if (i >= 0 && i < totalSlots) visiblePositions.push(i);
    }

    const isEligible = !myChecked && [...slots.values()]
      .filter(s => s.seq < mySeq && s.state === 'waiting')
      .length === 0;

    visiblePositions.forEach((pos, visIdx) => {
      // Find slot by position
      const slot = [...slots.values()].find(s => s.position === pos);
      if (!slot) return;

      const el = document.createElement('div');
      el.className = 'slot';
      el.dataset.seq = slot.seq;
      // Precise sub-pixel positioning based on scrollOffset
      const left = (pos - scrollOffset) * SLOT_WIDTH;
      el.style.position = 'absolute';
      el.style.left = left + 'px';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.disabled = true;
      cb.checked = slot.state === 'checked';

      const isMine = slot.seq === mySeq;

      if (isMine) {
        el.classList.add('mine');
        if (isEligible && !myChecked) {
          el.classList.add('eligible');
          cb.disabled = false;
          cb.addEventListener('change', () => {
            if (cb.checked) send({ type: 'check', token });
          });
        }
      }

      if (slot.state === 'ghost') {
        el.classList.add('ghost');
      }

      el.appendChild(cb);
      $strip.appendChild(el);

      // Position label every 5 positions
      if (pos % 5 === 0) {
        const lbl = document.createElement('div');
        lbl.className = 'strip-label';
        lbl.style.left = (left + SLOT_WIDTH / 2) + 'px';
        lbl.textContent = '#' + (pos + 1);
        $stripLabels.appendChild(lbl);
      }

      // Pointer below user's slot
      if (isMine) {
        const ptr = document.createElement('div');
        ptr.className = 'pointer-label';
        ptr.style.left = (left + SLOT_WIDTH / 2) + 'px';
        ptr.textContent = myChecked ? '✓ you' : '▲ you';
        $stripPointer.appendChild(ptr);
      }
    });
  }

  // ── Scroll Handling ──
  let lastSubscribedRange = { from: -1, to: -1 };
  const SLOT_WIDTH_JS = 34; // Matches CSS

  function updateScroll(delta, isAbsolute = false) {
    const prevOffset = scrollOffset;
    if (isAbsolute) {
      scrollOffset = Math.max(0, Math.min(totalSlots - 1, delta));
    } else {
      scrollOffset = Math.max(0, Math.min(totalSlots - 1, scrollOffset + delta / SLOT_WIDTH_JS));
    }

    if (scrollOffset !== prevOffset) {
      render();

      const visibleCount = Math.ceil(viewportWidth / SLOT_WIDTH_JS) + 10;
      const from = Math.max(0, Math.floor(scrollOffset) - 5);
      const to = from + visibleCount;

      if (Math.abs(from - lastSubscribedRange.from) > 5 || Math.abs(to - lastSubscribedRange.to) > 5) {
        send({ type: 'viewport_subscribe', from_position: from, to_position: to });
        lastSubscribedRange = { from, to };
      }
    }
  }

  window.addEventListener('wheel', (e) => {
    updateScroll(e.deltaY || e.deltaX);
  }, { passive: true });

  window.addEventListener('resize', () => {
    viewportWidth = $strip.clientWidth;
    render();
  });

  // ── Navigation Click Handlers ──
  $btnFront.addEventListener('click', () => {
    updateScroll(0, true);
  });

  $btnMe.addEventListener('click', () => {
    if (myPosition === null) return;
    const targetOffset = Math.max(0, myPosition - Math.floor((viewportWidth / SLOT_WIDTH) / 2));
    updateScroll(targetOffset, true);
  });

  $btnBack.addEventListener('click', () => {
    const targetOffset = Math.max(0, totalSlots - Math.floor((viewportWidth / SLOT_WIDTH) / 2));
    updateScroll(targetOffset, true);
  });

  // ── Colors ──
  const POSITIVE_COLORS = ['#00ffcc', '#99ff99', '#ff99cc'];
  const NEGATIVE_COLORS = ['#ff5050', '#ff9900', '#ff00ff'];

  function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function updatePosition(pos) {
    myPosition = pos;
    if (myChecked) {
      $posNumber.textContent = '✓';
      $posNumber.style.color = 'var(--primary)';
      $posLabel.textContent = 'you checked your box.';
      showStatus('You have checked your box. The contest notes your participation.', 'positive');
      document.title = '✓ The Waiting Game';
    } else if (pos === 0) {
      $posNumber.textContent = '#1';
      $posNumber.style.color = 'var(--secondary)';
      $posLabel.textContent = 'first in line';
      document.title = '#1 — The Waiting Game';
    } else {
      $posNumber.textContent = '#' + (pos + 1).toLocaleString();
      $posNumber.style.color = '';
      $posLabel.textContent = 'in line';
      document.title = '#' + (pos + 1).toLocaleString() + ' — The Waiting Game';
    }
  }

  function updateDepartures() {
    if (departuresTotal === 0) {
      $departureCounter.textContent = '';
      return;
    }
    $departureCounter.innerHTML =
      departuresTotal.toLocaleString() + ' have been<br>returned to the world today.';
  }

  function showAnnouncement(text, tone = 'positive') {
    const color = getRandom(tone === 'positive' ? POSITIVE_COLORS : NEGATIVE_COLORS);
    $announcement.textContent = text;
    $announcement.style.backgroundColor = color;
    $announcement.style.color = '#16161d';
    $announcement.classList.add('visible');
    setTimeout(() => $announcement.classList.remove('visible'), 12000);
  }

  function showStatus(text, tone = 'neutral') {
    $status.textContent = text;
    if (tone === 'positive') $status.style.color = getRandom(POSITIVE_COLORS);
    else if (tone === 'negative') $status.style.color = getRandom(NEGATIVE_COLORS);
    else $status.style.color = '';
  }

  function formatDuration(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ' + (s % 60) + 's';
    const h = Math.floor(m / 60);
    return h + 'h ' + (m % 60) + 'm';
  }

  // ── Message handling ──
  ws.addEventListener('open', () => {
    send({ type: 'join', token });
  });

  ws.addEventListener('message', (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    switch (msg.type) {

      case 'joined': {
        mySeq = msg.seq;
        myPosition = msg.position;
        $connectingMsg.style.display = 'none';
        $stripContainer.style.display = 'block';
        viewportWidth = $strip.clientWidth;
        
        // Initial scroll to center on user
        scrollOffset = Math.max(0, myPosition - Math.floor((viewportWidth / SLOT_WIDTH) / 2));
        
        updatePosition(msg.position);
        startPingLoop();
        showStatus(
          msg.position === 0
            ? 'You are first in line. It is your turn when you are ready.'
            : 'You are in line. The contest is aware of your presence.',
          msg.position === 0 ? 'positive' : 'neutral'
        );
        break;
      }

      case 'join_rejected': {
        $connectingMsg.textContent = 'The line was unavailable. You may try again shortly.';
        break;
      }

      case 'range_state': {
        totalSlots = msg.total;
        // Keep my slot if it exists
        const mine = mySeq !== null ? slots.get(mySeq) : null;
        slots.clear();
        if (mine) slots.set(mySeq, mine);

        for (const s of msg.slots) {
          slots.set(s.seq, { seq: s.seq, position: s.position, state: s.state });
        }
        render();
        break;
      }

      case 'range_update': {
        // New or updated slot
        slots.set(msg.seq, { seq: msg.seq, position: msg.position, state: msg.state });
        if (msg.position >= totalSlots) {
          totalSlots = msg.position + 1;
        }
        if (msg.seq === mySeq && msg.state === 'checked') {
          myChecked = true;
        }
        render();
        break;
      }

      case 'position_update': {
        updatePosition(msg.position);
        // Update position of user's own slot in the map
        if (mySeq !== null && slots.has(mySeq)) {
          slots.get(mySeq).position = msg.position;
        }
        render();
        break;
      }

      case 'left': {
        const s = slots.get(msg.seq);
        if (s) {
          // Ghost briefly, then remove
          s.state = 'ghost';
          render();
          setTimeout(() => {
            slots.delete(msg.seq);
            render();
          }, 30000);
        }
        departuresTotal = msg.departures_today;
        updateDepartures();
        break;
      }

      case 'check_ok': {
        myChecked = true;
        const s = slots.get(mySeq);
        if (s) s.state = 'checked';
        updatePosition(msg.position);
        showStatus('You have checked your box. The contest notes your participation.', 'positive');
        render();
        break;
      }

      case 'check_rejected': {
        if (msg.reason === 'not_eligible') {
          showStatus('It is not yet your turn. The box remains unavailable.', 'negative');
        }
        // Re-render to reset the checkbox visual
        const s = slots.get(mySeq);
        if (s) { /* state unchanged */ }
        render();
        break;
      }

      case 'winner': {
        const dur = formatDuration(msg.duration_ms);
        const pos = '#' + (msg.position + 1).toLocaleString();
        showAnnouncement(
          `A contestant at position ${pos} has checked their box after ${dur}. ` +
          `They have been recorded. The line continues.`
        );
        if (msg.seq !== mySeq) {
          showStatus('Someone ahead of you has finished. The line adjusts.', 'neutral');
        }
        break;
      }

      case 'pong':
        break;

      default:
        break;
    }
  });

  ws.addEventListener('close', () => {
    if (pingInterval) clearInterval(pingInterval);
    showStatus('The connection has been lost. Reload to rejoin at the back of the line.', 'negative');
  });

  ws.addEventListener('error', () => {
    showStatus('The connection encountered a difficulty.', 'negative');
  });

})();
</script>
</body>
</html>
