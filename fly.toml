app = "the-waiting-game"
primary_region = "ams"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  NODE_ENV = "production"
  DEPENDENCY_MODE = "LIVE"
  BACKEND_TARGET = "fly"

[[statics]]
  guest_path = "/app/client"
  url_prefix = "/"
