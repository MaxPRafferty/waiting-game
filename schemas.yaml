components:
  schemas:
    SlotSummary:
      type: object
      properties:
        seq:
          type: integer
        position:
          type: integer
        state:
          type: string
          enum: [waiting, checked]
    WinnerData:
      type: object
      properties:
        seq:
          type: integer
        position:
          type: integer
        duration_ms:
          type: integer
    DepartureData:
      type: object
      properties:
        seq:
          type: integer
        departures_today:
          type: integer
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        created_at:
          type: string
          format: date-time
    Badge:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        image_url:
          type: string
    Follow:
      type: object
      properties:
        target_token:
          type: string
        target_name:
          type: string
        created_at:
          type: string
          format: date-time
    Season:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
    Superlative:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
