openapi: 3.0.3
info:
  title: The Waiting Game REST API
  version: 0.1.0
  description: API for the sequential checkbox waiting game.
paths:
  /signup:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: 'schemas.yaml#/components/schemas/User'
                  token:
                    type: string
  /signin:
    post:
      summary: Sign in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successfully signed in
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: 'schemas.yaml#/components/schemas/User'
                  token:
                    type: string
  /auth/otp/send:
    post:
      summary: Send an OTP or Magic Link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                phone:
                  type: string
      responses:
        '200':
          description: Successfully sent
  /auth/otp/verify:
    post:
      summary: Verify an OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                phone:
                  type: string
                token:
                  type: string
                type:
                  type: string
                  enum: [email, sms, magiclink]
      responses:
        '200':
          description: Successfully verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: 'schemas.yaml#/components/schemas/User'
                  token:
                    type: string
  /checkbox/name:
    post:
      summary: Name your current live checkbox
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Successfully named
  /user/badges:
    get:
      summary: Get all badges for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  badges:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/components/schemas/Badge'
  /follow:
    post:
      summary: Follow a checkbox
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_token:
                  type: string
                target_name:
                  type: string
      responses:
        '200':
          description: Successfully followed
    get:
      summary: List all followed checkboxes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  follows:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/components/schemas/Follow'
  /join:
    post:
      summary: Join the line
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Successfully joined
          content:
            application/json:
              schema:
                type: object
                properties:
                  seq:
                    type: integer
                  position:
                    type: integer
        '429':
          description: Rate limited
  /check:
    post:
      summary: Check your box
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Successfully checked
          content:
            application/json:
              schema:
                type: object
                properties:
                  position:
                    type: integer
                  duration_ms:
                    type: integer
        '403':
          description: Not eligible or already checked
  /viewport:
    get:
      summary: Get a range of checkboxes
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: integer
        - name: to
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/components/schemas/SlotSummary'
                  total:
                    type: integer
  /leaderboard:
    get:
      summary: Get the recent winners
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  winners:
                    type: array
                    items:
                      $ref: '#/components/schemas/WinnerEntry'
  /og-image:
    get:
      summary: Get a dynamic OG image for a position
      parameters:
        - name: position
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    WinnerEntry:
      $ref: 'schemas.yaml#/components/schemas/WinnerEntry'
